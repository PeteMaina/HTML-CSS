<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>QR Code Generator</title>
</head>
<body>
    <main class="container">
        <!-- Header -->
        <header class="header">
            <h1>QR Code Generator</h1>
            <p class="subtitle">Create QR codes instantly. Free, fast, and reliable.</p>
        </header>

        <!-- QR Generator Card -->
        <section class="generator-card">
            <!-- Input Section -->
            <div class="input-section">
                <label for="qr-text" class="input-label">Enter your content</label>
                <input 
                    type="text" 
                    id="qr-text" 
                    class="text-input" 
                    placeholder="https://example.com or any text"
                    autocomplete="off"
                >
            </div>

            <!-- Size Selection -->
            <div class="size-section">
                <label for="sizes" class="input-label">Select size</label>
                <select id="sizes" class="size-select">
                    <option value="100">100 × 100 px</option>
                    <option value="200">200 × 200 px</option>
                    <option value="300" selected>300 × 300 px</option>
                    <option value="400">400 × 400 px</option>
                    <option value="500">500 × 500 px</option>
                    <option value="600">600 × 600 px</option>
                </select>
            </div>

            <!-- QR Code Display -->
            <div class="qr-display">
                <div id="qr-body" class="qr-output">
                    <div class="qr-placeholder">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="7" height="7" rx="1"/>
                            <rect x="14" y="3" width="7" height="7" rx="1"/>
                            <rect x="3" y="14" width="7" height="7" rx="1"/>
                            <rect x="14" y="14" width="4" height="4" rx="0.5"/>
                        </svg>
                        <span>Your QR code will appear here</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button id="generateBtn" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M7 7h.01M7 12h.01M7 17h.01M12 7h.01M12 12h.01M12 17h.01M17 7h.01M17 12h.01M17 17h.01"/>
                    </svg>
                    Generate QR Code
                </button>
                <button id="downloadBtn" class="btn btn-secondary" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download
                </button>
            </div>
        </section>

        <!-- Features -->
        <section class="features">
            <div class="feature">
                <div class="feature-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                <h3>Instant</h3>
                <p>Generate in milliseconds</p>
            </div>
            <div class="feature">
                <div class="feature-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <h3>Secure</h3>
                <p>Processed locally</p>
            </div>
            <div class="feature">
                <div class="feature-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </div>
                <h3>Free</h3>
                <p>No registration needed</p>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; <span id="copyrightYear"></span> All rights reserved &bull; <a href="https://mainapeter.netlify.app" target="_blank" rel="noopener" class="developer-link">Peter Maina</a></p>
        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('copyrightYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
